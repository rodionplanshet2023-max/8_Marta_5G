<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Квиз к 8 марта</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #fbe9f2 0%, #f8d0e0 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }
        .app-container {
            max-width: 1000px;
            width: 100%;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            box-shadow: 0 30px 50px rgba(180, 60, 120, 0.25);
            overflow: hidden;
            padding: 25px;
            border: 2px solid #ffffff70;
        }
        /* Анимация-заставка (сплеш) */
        .splash-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            text-align: center;
            animation: fadeIn 1.2s ease-out;
        }
        .splash-screen h1 {
            font-size: 4rem;
            color: #c53b7c;
            text-shadow: 0 8px 20px #ffb6d9;
            margin-bottom: 20px;
            animation: float 2s infinite ease-in-out;
        }
        .splash-screen p {
            font-size: 1.8rem;
            color: #9f4d73;
            margin-bottom: 40px;
        }
        .splash-screen button {
            background: #d45996;
            border: none;
            color: white;
            font-size: 2rem;
            padding: 20px 60px;
            border-radius: 60px;
            box-shadow: 0 10px 0 #972962, 0 10px 25px #f598c4;
            cursor: pointer;
            transition: 0.07s;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .splash-screen button:active {
            transform: translateY(10px);
            box-shadow: 0 2px 0 #972962, 0 5px 20px #f598c4;
        }
        /* ХЕДЕР главной */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .teams-panel {
            display: flex;
            gap: 20px;
            background: #ffffffaa;
            border-radius: 40px;
            padding: 15px 25px;
            box-shadow: inset 0 2px 8px #ffc1d4, 0 6px 12px #ffb0c8;
        }
        .team-input {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .team-input label {
            font-weight: 600;
            color: #b34377;
            margin-bottom: 5px;
        }
        .team-input input {
            border: 2px solid #f59ec6;
            border-radius: 30px;
            padding: 8px 15px;
            font-size: 1.1rem;
            width: 140px;
            background: white;
            text-align: center;
            font-weight: 600;
            color: #6b2d4b;
        }
        .leaderboard-btn {
            background: #fcedf3;
            border: 3px solid #dc84af;
            border-radius: 50px;
            padding: 10px 25px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #a73c72;
            cursor: pointer;
            box-shadow: 0 5px 0 #b35f89;
            transition: 0.07s;
            white-space: nowrap;
        }
        .leaderboard-btn:active {
            transform: translateY(5px);
            box-shadow: none;
        }
        /* главная игровая панель (темы + сетка вопросов) */
        .quiz-main {
            background: #ffffffd6;
            border-radius: 50px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 0 2px white, 0 15px 25px #f4b7d0;
        }
        .theme-tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            justify-content: center;
        }
        .theme-btn {
            background: #ffe2ef;
            border: 3px solid #d36f9e;
            font-size: 1.8rem;
            padding: 15px 30px;
            border-radius: 60px;
            font-weight: 700;
            color: #882e5b;
            cursor: pointer;
            flex: 1;
            max-width: 300px;
            box-shadow: 0 6px 0 #b1547c;
            transition: 0.07s;
            text-align: center;
        }
        .theme-btn.active {
            background: #d36f9e;
            color: white;
            border-color: #af dear;
            transform: translateY(3px);
            box-shadow: 0 3px 0 #732a4b;
        }
        .questions-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }
        .question-card {
            background: white;
            border-radius: 40px;
            padding: 15px;
            width: 100px;
            height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 4px solid #f5a3c5;
            font-weight: bold;
            color: #5b2e45;
            box-shadow: 0 8px 0 #d474a3;
            cursor: pointer;
            transition: 0.07s;
        }
        .question-card.used {
            opacity: 0.35;
            pointer-events: none;
            filter: grayscale(0.6);
            border-color: #afafaf;
            box-shadow: 0 5px 0 #8a8a8a;
            transform: scale(0.95);
        }
        .question-card:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0 #d474a3;
        }
        .question-points {
            font-size: 1.8rem;
            line-height: 1;
        }
        .question-bonus {
            font-size: 0.9rem;
            color: #a74e79;
        }
        /* Окно вопроса */
        .question-window {
            background: #fff0f7;
            border-radius: 50px;
            padding: 25px;
            margin: 20px 0;
            border: 3px solid white;
        }
        .q-text {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #2d1424;
        }
        .q-image {
            font-size: 4rem;  /* Эмодзи вместо картинок (условно) */
            background: #ffe2f0;
            border-radius: 40px;
            padding: 15px;
            text-align: center;
            margin-bottom: 25px;
            border: 2px dashed #d47baa;
            color: #ac4d7c;
        }
        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }
        .option-btn {
            background: white;
            border: 3px solid #d87aa7;
            border-radius: 100px;
            padding: 12px;
            font-size: 1.3rem;
            font-weight: 500;
            color: #611f40;
            cursor: pointer;
            transition: 0.07s;
            text-align: left;
            padding-left: 25px;
        }
        .option-btn.selected {
            background: #bb6792;
            color: white;
            border-color: #a14073;
        }
        .score-buttons {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 20px 0 10px;
        }
        .give-score-btn {
            background: #b8d47a;
            border: none;
            border-radius: 50px;
            padding: 15px 30px;
            font-size: 1.4rem;
            font-weight: bold;
            color: #2c4f2c;
            border-bottom: 6px solid #6b8f45;
            cursor: pointer;
            transition: 0.07s;
            flex: 1;
            min-width: 150px;
        }
        .give-score-btn:active {
            transform: translateY(6px);
            border-bottom-width: 2px;
        }
        .cancel-question {
            background: #e3bfcc;
            border: none;
            border-radius: 50px;
            padding: 10px 25px;
            font-size: 1.2rem;
            cursor: pointer;
        }
        /* Таблица лидеров */
        .leaderboard-overlay {
            background: #fee9f1f0;
            border-radius: 60px;
            padding: 30px;
            margin-top: 20px;
            border: 4px solid white;
        }
        .leaderboard-row {
            display: flex;
            justify-content: space-between;
            font-size: 2rem;
            padding: 15px 30px;
            background: white;
            border-radius: 50px;
            margin-bottom: 15px;
            font-weight: 700;
        }
        .leaderboard-row span:first-child { color: #a34173; }
        .leaderboard-row span:last-child { color: #3c7a3c; }
        .close-leaderboard {
            background: #e085b1;
            color: white;
            border: none;
            font-size: 1.5rem;
            padding: 10px 35px;
            border-radius: 50px;
            font-weight: bold;
            margin-top: 10px;
        }
        .hidden { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        @keyframes float { 0% { transform: translateY(0); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0); } }
    </style>
</head>
<body>
<div class="app-container" id="appContainer">
    <!-- ЭКРАН ЗАСТАВКИ (splash) -->
    <div id="splash" class="splash-screen">
        <h1>🌸 8 марта 🌸</h1>
        <p>С праздником, девчонки!</p>
        <button id="startBtn">Войти в игру →</button>
    </div>

    <!-- ОСНОВНОЙ ИНТЕРФЕЙС (скрыт до нажатия) -->
    <div id="mainGame" class="hidden">
        <div class="header">
            <div class="teams-panel">
                <div class="team-input">
                    <label>Команда 1</label>
                    <input type="text" id="team1" placeholder="Например: Розы" value="Розы">
                </div>
                <div class="team-input">
                    <label>Команда 2</label>
                    <input type="text" id="team2" placeholder="Тюльпаны" value="Тюльпаны">
                </div>
                <div class="team-input">
                    <label>Команда 3</label>
                    <input type="text" id="team3" placeholder="Мимозы" value="Мимозы">
                </div>
            </div>
            <button class="leaderboard-btn" id="showLeaderboardBtn">🏆 Таблица лидеров</button>
        </div>

        <div class="quiz-main">
            <div class="theme-tabs">
                <div class="theme-btn active" id="theme1Btn">Тема 1</div>
                <div class="theme-btn" id="theme2Btn">Тема 2</div>
            </div>

            <!-- Сетка вопросов (баллы) -->
            <div id="questionsGrid" class="questions-grid">
                <!-- Динамически JS создаст 5 карточек -->
            </div>

            <!-- Панель текущего вопроса (появляется после клика на баллы) -->
            <div id="questionPanel" class="question-window hidden">
                <div class="q-text" id="questionText">Загружается...</div>
                <div class="q-image" id="questionImage">🌸</div>
                <div class="options" id="optionsContainer">
                    <!-- Варианты А-Г сгенерируются -->
                </div>
                <div class="score-buttons" id="scoreButtons">
                    <!-- Кнопки Команда 1, Команда 2, Команда 3 -->
                </div>
                <button id="cancelQuestionBtn" class="cancel-question">✖ Закрыть вопрос</button>
            </div>
        </div>

        <!-- Таблица лидеров (изначально скрыта) -->
        <div id="leaderboardPanel" class="leaderboard-overlay hidden">
            <div id="leaderboardContent"></div>
            <button class="close-leaderboard" id="closeLeaderboardBtn">Закрыть</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // ========== ДАННЫЕ КВИЗА ==========
        // Две темы, в каждой по 5 вопросов, баллы: 10,20,30,40,50.
        // Для демо везде стоят вопросы про весну/8 марта, но можно поменять.
        const quizData = {
            theme1: {
                name: '🌷 Весенние цветы',
                questions: [
                    { points: 10, text: 'Какой цветок считается символом 8 марта в России?', image: '🌹❓', options: ['Тюльпан', 'Роза', 'Мимоза', 'Подснежник'], correct: 2 }, // мимоза
                    { points: 20, text: 'Как называется наука о растениях?', image: '📚🌿', options: ['Биология', 'Ботаника', 'Зоология', 'Геология'], correct: 1 },
                    { points: 30, text: 'Какое растение дарят в горшке чаще всего?', image: '🪴', options: ['Фикус', 'Кактус', 'Орхидея', 'Герань'], correct: 2 },
                    { points: 40, text: 'Какой цветок имеет шипы?', image: '🥀', options: ['Роза', 'Пион', 'Лилия', 'Ромашка'], correct: 0 },
                    { points: 50, text: 'Какой цветок распускается самым первым весной?', image: '🌱', options: ['Крокус', 'Гладиолус', 'Астра', 'Георгин'], correct: 0 }
                ]
            },
            theme2: {
                name: '🍰 Праздничный стол',
                questions: [
                    { points: 10, text: 'Традиционный салат на 8 марта?', image: '🥗', options: ['Оливье', 'Цезарь', 'Греческий', 'Мимоза'], correct: 3 },
                    { points: 20, text: 'Что обычно дарят к чаю?', image: '🍰', options: ['Торт', 'Пирожки', 'Конфеты', 'Печенье'], correct: 0 },
                    { points: 30, text: 'Из чего делают попкорн?', image: '🍿', options: ['Рис', 'Пшеница', 'Кукуруза', 'Гречка'], correct: 2 },
                    { points: 40, text: 'Какой напиток получают из яблок?', image: '🧃', options: ['Сок', 'Компот', 'Сидр', 'Квас'], correct: 2 },
                    { points: 50, text: 'Какой фрукт кладут в "Фруктовый салат"?', image: '🍌🍎', options: ['Банан', 'Апельсин', 'Киви', 'Все выше'], correct: 3 }
                ]
            }
        };

        // Состояние игры
        let currentTheme = 'theme1';              // theme1 или theme2
        let usedQuestions = [];                    // строки "theme1-10", "theme2-20" и т.д.
        let currentQuestion = null;                // { theme, points, data }
        let selectedOptionIndex = -1;               // для выбранного варианта А-Г

        // Счет команд (динамически берем из input)
        function getScores() {
            return {
                team1: parseInt(localStorage.getItem('team1Score') || '0'),
                team2: parseInt(localStorage.getItem('team2Score') || '0'),
                team3: parseInt(localStorage.getItem('team3Score') || '0')
            };
        }
        function setScores(t1, t2, t3) {
            localStorage.setItem('team1Score', t1.toString());
            localStorage.setItem('team2Score', t2.toString());
            localStorage.setItem('team3Score', t3.toString());
        }
        // инициализация если пусто
        if (!localStorage.getItem('team1Score')) setScores(0,0,0);

        // Вспомогательная функция для получения названий команд из input
        function getTeamNames() {
            return {
                name1: document.getElementById('team1')?.value || 'Команда 1',
                name2: document.getElementById('team2')?.value || 'Команда 2',
                name3: document.getElementById('team3')?.value || 'Команда 3',
            };
        }

        // ========== ОТРИСОВКА ==========
        function renderGrid() {
            const grid = document.getElementById('questionsGrid');
            if (!grid) return;
            const themeData = quizData[currentTheme].questions;
            grid.innerHTML = '';
            themeData.forEach(q => {
                const key = `${currentTheme}-${q.points}`;
                const isUsed = usedQuestions.includes(key);
                const card = document.createElement('div');
                card.className = `question-card ${isUsed ? 'used' : ''}`;
                card.setAttribute('data-points', q.points);
                card.innerHTML = `<div class="question-points">${q.points}</div><div class="question-bonus">баллов</div>`;
                if (!isUsed) {
                    card.addEventListener('click', (e) => {
                        e.stopPropagation();
                        openQuestion(currentTheme, q.points);
                    });
                }
                grid.appendChild(card);
            });
        }

        function openQuestion(theme, points) {
            const questionObj = quizData[theme].questions.find(q => q.points === points);
            if (!questionObj) return;
            currentQuestion = { theme, points, data: questionObj };
            selectedOptionIndex = -1; // сброс выбранного варианта

            // заполняем панель вопроса
            document.getElementById('questionText').innerText = questionObj.text;
            document.getElementById('questionImage').innerText = questionObj.image;

            const optsDiv = document.getElementById('optionsContainer');
            optsDiv.innerHTML = '';
            const letters = ['А', 'Б', 'В', 'Г'];
            questionObj.options.forEach((opt, idx) => {
                const btn = document.createElement('div');
                btn.className = 'option-btn';
                btn.innerText = `${letters[idx]}. ${opt}`;
                btn.setAttribute('data-opt-index', idx);
                btn.addEventListener('click', () => {
                    // убираем выделение со всех
                    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedOptionIndex = idx;
                });
                optsDiv.appendChild(btn);
            });

            // кнопки командам
            const scoreDiv = document.getElementById('scoreButtons');
            const names = getTeamNames();
            scoreDiv.innerHTML = '';
            [names.name1, names.name2, names.name3].forEach((teamName, idx) => {
                const btn = document.createElement('button');
                btn.className = 'give-score-btn';
                btn.innerText = `+ ${currentQuestion.data.points} → ${teamName}`;
                btn.addEventListener('click', () => {
                    // проверка: выбран ли вариант?
                    if (selectedOptionIndex === -1) {
                        alert('Сначала выберите вариант ответа (А-Г)!');
                        return;
                    }
                    // проверка правильности (для викторины)
                    const isCorrect = (selectedOptionIndex === currentQuestion.data.correct);
                    if (!isCorrect) {
                        alert('Неправильный ответ. Баллы не начислены :(');
                    } else {
                        // начисляем баллы команде
                        const scores = getScores();
                        if (idx === 0) scores.team1 += currentQuestion.data.points;
                        else if (idx === 1) scores.team2 += currentQuestion.data.points;
                        else scores.team3 += currentQuestion.data.points;
                        setScores(scores.team1, scores.team2, scores.team3);
                        alert(`✅ Верно! ${currentQuestion.data.points} баллов команде ${teamName}`);
                    }
                    // Помечаем вопрос как использованный и закрываем панель
                    markQuestionUsed(currentTheme, currentQuestion.points);
                    closeQuestionPanel();
                });
                scoreDiv.appendChild(btn);
            });

            document.getElementById('questionPanel').classList.remove('hidden');
        }

        function markQuestionUsed(theme, points) {
            const key = `${theme}-${points}`;
            if (!usedQuestions.includes(key)) {
                usedQuestions.push(key);
            }
            renderGrid(); // обновить сетку (кнопка станет неактивной)
        }

        function closeQuestionPanel() {
            document.getElementById('questionPanel').classList.add('hidden');
            currentQuestion = null;
            selectedOptionIndex = -1;
        }

        function renderLeaderboard() {
            const scores = getScores();
            const names = getTeamNames();
            const contentDiv = document.getElementById('leaderboardContent');
            contentDiv.innerHTML = '';
            const rows = [
                { name: names.name1, score: scores.team1 },
                { name: names.name2, score: scores.team2 },
                { name: names.name3, score: scores.team3 }
            ];
            // сортировка по убыванию баллов
            rows.sort((a,b) => b.score - a.score);
            rows.forEach(r => {
                const row = document.createElement('div');
                row.className = 'leaderboard-row';
                row.innerHTML = `<span>${r.name}</span> <span>${r.score} баллов</span>`;
                contentDiv.appendChild(row);
            });
        }

        // ========== СЛУШАТЕЛИ ==========
        document.getElementById('startBtn').addEventListener('click', () => {
            document.getElementById('splash').classList.add('hidden');
            document.getElementById('mainGame').classList.remove('hidden');
            renderGrid();
        });

        // Переключение тем
        document.getElementById('theme1Btn').addEventListener('click', () => {
            currentTheme = 'theme1';
            document.getElementById('theme1Btn').classList.add('active');
            document.getElementById('theme2Btn').classList.remove('active');
            renderGrid();
            closeQuestionPanel();
        });
        document.getElementById('theme2Btn').addEventListener('click', () => {
            currentTheme = 'theme2';
            document.getElementById('theme2Btn').classList.add('active');
            document.getElementById('theme1Btn').classList.remove('active');
            renderGrid();
            closeQuestionPanel();
        });

        // Кнопка закрыть вопрос
        document.getElementById('cancelQuestionBtn').addEventListener('click', closeQuestionPanel);

        // Таблица лидеров
        document.getElementById('showLeaderboardBtn').addEventListener('click', () => {
            renderLeaderboard();
            document.getElementById('leaderboardPanel').classList.remove('hidden');
        });
        document.getElementById('closeLeaderboardBtn').addEventListener('click', () => {
            document.getElementById('leaderboardPanel').classList.add('hidden');
        });

        // При изменении названий команд нигде ничего не ломается (просто перерисовка не требуется)

        // Сброс использованных при старте (если хотим начать заново - перезагрузить страницу)
        // Но можно добавить кнопку сброса, но не обязательно.

        // инициализация сетки при загрузке вкладки (если splash пропустили, но у нас скрыто)
        renderGrid();

        // Дополнительно: обработка обновления данных команд (можно не перерисовывать)
    })();
</script>
</body>
</html>
