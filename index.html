<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🔥 Бьюти-квиз + Clash Royale + Мега сложные</title>
    <!-- Библиотека конфетти -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
            transition: background-color 0.3s, color 0.2s, border-color 0.2s;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        /* СВЕТЛАЯ ТЕМА */
        body.light-theme {
            background: linear-gradient(145deg, #2d1b2b 0%, #1a1a2e 100%);
        }
        body.light-theme .app-container {
            background: rgba(255, 240, 245, 0.95);
            border: 2px solid #ffb6c1;
        }
        body.light-theme .splash-screen h1 { color: #ff1493; }
        body.light-theme .splash-screen p { color: #9400d3; }
        body.light-theme .splash-screen button { background: #ff1493; }
        body.light-theme .teams-panel { background: #ffe4e1; }
        body.light-theme .team-input label { color: #c71585; }
        body.light-theme .team-input input { border: 2px solid #ff69b4; color: #4b0082; }
        body.light-theme .leaderboard-btn { background: #f0e6ff; border: 3px solid #da70d6; color: #8a2be2; }
        body.light-theme .quiz-main { background: #fff0f5; }
        body.light-theme .theme-btn { background: #ffe4e1; border: 3px solid #db7093; color: #b0306a; }
        body.light-theme .theme-btn.active { background: #db7093; color: white; }
        body.light-theme .question-card { background: white; border: 4px solid #ffb6c1; color: #8b4513; }
        body.light-theme .question-window { background: #ffe4f0; }
        body.light-theme .q-text { color: #4b0082; }
        body.light-theme .option-btn { background: white; border: 3px solid #ff99cc; color: #4b0082; }
        body.light-theme .option-btn.selected { background: #dda0dd; color: white; }
        body.light-theme .give-score-btn { background: #98fb98; color: #006400; }
        body.light-theme .penalty-btn { background: #ffb6c1; color: #8b0000; }
        body.light-theme .cancel-question { background: #d3d3d3; }
        body.light-theme .leaderboard-overlay { background: #faf0e6; }
        body.light-theme .leaderboard-row { background: white; }
        body.light-theme .leaderboard-row span:first-child { color: #c71585; }
        body.light-theme .leaderboard-row span:last-child { color: #228b22; }
        body.light-theme .theme-toggle { background: #ffe4e1; color: #b0306a; border: 2px solid #db7093; }
        body.light-theme .cat-button { background: #ffd700; color: #8b4513; }
        body.light-theme .fate-button { background: #9370db; color: white; }
        body.light-theme .reset-button { background: #ff6b6b; color: white; }

        /* ТЁМНАЯ ТЕМА */
        body.dark-theme {
            background: linear-gradient(145deg, #0a0a0f 0%, #1a1a2e 100%);
        }
        body.dark-theme .app-container {
            background: rgba(30, 20, 30, 0.95);
            border: 2px solid #9b4d6e;
        }
        body.dark-theme .splash-screen h1 { color: #ff69b4; }
        body.dark-theme .splash-screen p { color: #b180c0; }
        body.dark-theme .splash-screen button { background: #9b4d6e; }
        body.dark-theme .teams-panel { background: #2a1f2a; }
        body.dark-theme .team-input label { color: #ff99cc; }
        body.dark-theme .team-input input { background: #3a2a3a; border: 2px solid #9b4d6e; color: #ffb6c1; }
        body.dark-theme .leaderboard-btn { background: #3a2a3a; border: 3px solid #9b4d6e; color: #ff99cc; }
        body.dark-theme .quiz-main { background: #2a1f2a; }
        body.dark-theme .theme-btn { background: #3a2a3a; border: 3px solid #9b4d6e; color: #ff99cc; }
        body.dark-theme .theme-btn.active { background: #9b4d6e; color: white; }
        body.dark-theme .question-card { background: #3a2a3a; border: 4px solid #9b4d6e; color: #ffb6c1; }
        body.dark-theme .question-window { background: #2a1f2a; }
        body.dark-theme .q-text { color: #ff99cc; }
        body.dark-theme .option-btn { background: #3a2a3a; border: 3px solid #9b4d6e; color: #ffb6c1; }
        body.dark-theme .option-btn.selected { background: #9b4d6e; color: white; }
        body.dark-theme .give-score-btn { background: #2a5a2a; color: #98fb98; }
        body.dark-theme .penalty-btn { background: #6b3a3a; color: #ffb6c1; }
        body.dark-theme .cancel-question { background: #4a3a4a; color: #ffb6c1; }
        body.dark-theme .leaderboard-overlay { background: #2a1f2a; }
        body.dark-theme .leaderboard-row { background: #3a2a3a; }
        body.dark-theme .leaderboard-row span:first-child { color: #ff99cc; }
        body.dark-theme .leaderboard-row span:last-child { color: #98fb98; }
        body.dark-theme .theme-toggle { background: #3a2a3a; color: #ff99cc; border: 2px solid #9b4d6e; }
        body.dark-theme .cat-button { background: #b8860b; color: #ffd700; }
        body.dark-theme .fate-button { background: #6a4e9b; color: white; }
        body.dark-theme .reset-button { background: #8b3a3a; color: white; }

        .app-container {
            max-width: 1200px;
            width: 100%;
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 30px 50px rgba(255, 20, 147, 0.4);
            overflow: hidden;
            padding: 15px;
        }
        /* Переключатель темы */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        /* Кнопки экшн */
        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin: 15px 0;
        }
        .cat-button, .fate-button, .reset-button {
            border: none;
            border-radius: 50px;
            padding: 12px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.07s;
            box-shadow: 0 5px 0 rgba(0,0,0,0.2);
            flex: 1;
            min-width: 120px;
        }
        .cat-button:active, .fate-button:active, .reset-button:active {
            transform: translateY(5px);
            box-shadow: none;
        }
        .splash-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
            text-align: center;
            animation: fadeIn 1.2s ease-out;
            padding: 20px 10px;
        }
        .splash-screen h1 {
            font-size: clamp(2.5rem, 10vw, 4rem);
            margin-bottom: 15px;
            animation: float 2s infinite ease-in-out;
            line-height: 1.2;
        }
        .splash-screen p {
            font-size: clamp(1.2rem, 5vw, 1.8rem);
            margin-bottom: 30px;
        }
        .splash-screen button {
            border: none;
            font-size: clamp(1.5rem, 6vw, 2rem);
            padding: 15px 40px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.07s;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 20px;
            width: 90%;
            max-width: 400px;
            color: white;
        }
        .splash-screen button:active {
            transform: translateY(8px);
            box-shadow: 0 2px 0 #8b008b, 0 5px 20px #ff69b4;
        }
        .splash-screen .terms {
            font-size: 0.9rem;
            max-width: 90%;
            margin-top: 10px;
            padding: 0 10px;
        }
        .splash-screen .terms a {
            text-decoration: none;
            font-weight: bold;
        }
        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .teams-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            border-radius: 30px;
            padding: 20px 15px;
            box-shadow: inset 0 2px 8px #ffb6c1, 0 6px 12px #d8bfd8;
            width: 100%;
        }
        .team-input {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 200px;
        }
        .team-input label {
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }
        .team-input input {
            border-radius: 30px;
            padding: 10px 15px;
            font-size: 1rem;
            width: 100%;
            text-align: center;
            font-weight: 600;
        }
        .leaderboard-btn {
            border-radius: 50px;
            padding: 12px 25px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.07s;
            white-space: nowrap;
            width: 90%;
            max-width: 300px;
        }
        .leaderboard-btn:active {
            transform: translateY(5px);
            box-shadow: none;
        }
        .quiz-main {
            border-radius: 30px;
            padding: 20px 15px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 0 2px white, 0 15px 25px #dda0dd;
        }
        .theme-tabs {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
            align-items: center;
        }
        .theme-btn {
            font-size: 1.3rem;
            padding: 15px 20px;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            max-width: 350px;
            transition: 0.07s;
            text-align: center;
        }
        .theme-btn.active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #8b3a5e;
        }
        .questions-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 25px 0;
        }
        .question-card {
            border-radius: 25px;
            padding: 10px;
            width: 80px;
            height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 6px 0 #dda0dd;
            cursor: pointer;
            transition: 0.07s;
        }
        .question-card.used {
            opacity: 0.35;
            pointer-events: none;
            filter: grayscale(0.6);
            border-color: #a9a9a9;
            box-shadow: 0 4px 0 #808080;
            transform: scale(0.95);
        }
        .question-card:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0 #dda0dd;
        }
        .question-points {
            font-size: 1.5rem;
            line-height: 1;
        }
        .question-bonus {
            font-size: 0.7rem;
        }
        .question-window {
            border-radius: 30px;
            padding: 20px 15px;
            margin: 20px 0;
        }
        .q-text {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1.4;
        }
        .q-image {
            border-radius: 25px;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
            min-height: 180px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .q-image img {
            max-width: 100%;
            max-height: 250px;
            border-radius: 15px;
            object-fit: contain;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }
        .option-btn {
            border-radius: 40px;
            padding: 15px 20px;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.07s;
            text-align: left;
            width: 100%;
            word-break: break-word;
        }
        .score-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0 15px;
        }
        .give-score-btn {
            border: none;
            border-radius: 40px;
            padding: 15px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.07s;
            width: 100%;
            word-break: break-word;
        }
        .give-score-btn:active {
            transform: translateY(5px);
            border-bottom-width: 2px;
        }
        .penalty-buttons {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }
        .penalty-btn {
            border: none;
            border-radius: 30px;
            padding: 10px;
            font-size: 1rem;
            font-weight: bold;
            border-bottom: 4px solid #8b0000;
            cursor: pointer;
            transition: 0.07s;
            flex: 1;
        }
        .penalty-btn:active {
            transform: translateY(4px);
            border-bottom-width: 1px;
        }
        .cancel-question {
            border: none;
            border-radius: 40px;
            padding: 12px 20px;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
        }
        .leaderboard-overlay {
            border-radius: 30px;
            padding: 20px;
            margin-top: 20px;
        }
        .leaderboard-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            padding: 15px 20px;
            border-radius: 30px;
            margin-bottom: 12px;
            font-weight: 700;
            flex-wrap: wrap;
            gap: 10px;
        }
        .leaderboard-row span:first-child { 
            word-break: break-word;
            max-width: 60%;
        }
        .leaderboard-row span:last-child { 
            white-space: nowrap;
        }
        .close-leaderboard {
            border: none;
            font-size: 1.3rem;
            padding: 12px 25px;
            border-radius: 40px;
            font-weight: bold;
            margin-top: 10px;
            cursor: pointer;
            width: 100%;
        }
        .fate-event {
            margin: 20px 0;
            padding: 20px;
            border-radius: 40px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            animation: bounceIn 0.5s;
            background: linear-gradient(145deg, #ffd700, #ffa500);
            color: #4b0082;
            border: 3px solid white;
        }
        .hidden { display: none; }
        
        @keyframes fadeIn { 
            from { opacity: 0; transform: scale(0.9); } 
            to { opacity: 1; transform: scale(1); } 
        }
        @keyframes float { 
            0% { transform: translateY(0); } 
            50% { transform: translateY(-5px); } 
            100% { transform: translateY(0); } 
        }
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); opacity: 1; }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }
        @media (max-width: 380px) {
            .question-card {
                width: 70px;
                height: 70px;
            }
            .question-points {
                font-size: 1.3rem;
            }
            .team-input {
                max-width: 100%;
            }
        }
    </style>
</head>
<body class="light-theme">
    <!-- Переключатель темы -->
    <div class="theme-toggle" id="themeToggle" title="Сменить тему">🌙</div>

<div class="app-container" id="appContainer">
    <!-- ЗАСТАВКА -->
    <div id="splash" class="splash-screen">
        <h1>💄 8 марта + Clash 👑</h1>
        <p>Мега-бьюти квиз</p>
        <button id="startBtn">Войти в игру →</button>
        <div class="terms">
            Нажимая на кнопку «Войти в игру», вы автоматически соглашаетесь с <a href="https://твоя-ссылка.ru" target="_blank">условиями использования</a>
        </div>
    </div>

    <!-- ОСНОВНАЯ ИГРА -->
    <div id="mainGame" class="hidden">
        <div class="header">
            <div class="teams-panel">
                <div class="team-input">
                    <label>Команда 1</label>
                    <input type="text" id="team1" value="💅 Визажистки">
                </div>
                <div class="team-input">
                    <label>Команда 2</label>
                    <input type="text" id="team2" value="💋 Бьюти-блогерки">
                </div>
                <div class="team-input">
                    <label>Команда 3</label>
                    <input type="text" id="team3" value="👑 Клэшеры">
                </div>
            </div>
            <button class="leaderboard-btn" id="showLeaderboardBtn">🏆 Таблица лидеров</button>
        </div>

        <!-- Кнопки действий -->
        <div class="action-buttons">
            <button class="cat-button" id="catButton">🎁 Кот в мешке</button>
            <button class="fate-button" id="fateButton">🎲 Судьба-злодейка</button>
            <button class="reset-button" id="resetButton">☠️ Всё пропало</button>
        </div>

        <div class="quiz-main">
            <div class="theme-tabs">
                <div class="theme-btn active" id="theme1Btn">💄 Бьюти-эксперт</div>
                <div class="theme-btn" id="theme2Btn">👑 Clash Royale</div>
                <div class="theme-btn" id="theme3Btn">👸 Богини красоты</div>
            </div>

            <div id="questionsGrid" class="questions-grid"></div>

            <div id="questionPanel" class="question-window hidden">
                <div class="q-text" id="questionText">Загружается...</div>
                <div class="q-image" id="questionImage">🌸</div>
                <div class="options" id="optionsContainer"></div>
                <div class="score-buttons" id="scoreButtons"></div>
                
                <!-- Штрафные кнопки -->
                <div class="penalty-buttons" id="penaltyButtons"></div>
                
                <button id="cancelQuestionBtn" class="cancel-question">✖ Закрыть вопрос</button>
            </div>

            <!-- Событие судьбы -->
            <div id="fateEvent" class="fate-event hidden"></div>
        </div>

        <div id="leaderboardPanel" class="leaderboard-overlay hidden">
            <div id="leaderboardContent"></div>
            <button class="close-leaderboard" id="closeLeaderboardBtn">Закрыть</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // ========== ВСЕ ВОПРОСЫ ==========

                    {

                        options: [

                            'Для точечной маскировки несовершенств и зоны под глазами',

                        correct: 2 
                    },
                    { 
                        points: 50, 
                        text: 'Для чего предназначен «Силиконовый спонж» (Силипафф)?', 
                        image: '<img src="https://avatars.mds.yandex.net/i?id=523f6b9ea9b2f2b390df54e8dc0cfc5d_sr-7045478-images-thumbs&n=13" alt="spong" style="max-width: 100%; max-height: 250px; border-radius: 15px; object-fit: contain;">',
                        options: [

                            'Для нанесения тональных средств без впитывания',
                            'Подкладка под глаза от осыпания теней',
                            'Многоразовый патч от морщин'

                        correct: 1 
                    }
                ]
            },
            theme2: {
                name: '👑 Clash Royale',
                questions: [
                    { 
                        points: 10, 
                        text: 'Сколько эликсира стоит Хог Райдер (Hog Rider)?',
                        image: '<img src="https://avatars.mds.yandex.net/get-shedevrum/12445758/img_e1f94757258511efb97ba615c8878788/orig" alt="piska_gay" style="max-width: 100%; max-height: 250px; border-radius: 15px; object-fit: contain;">',
                        options: ['3', '4', '5', '6'], 
                        correct: 1 
                    },
                    { 
                        points: 20, 
                        text: 'Какая карта является легендарной?', 
                        image: '<img src="https://yt3.googleusercontent.com/ytc/AIdro_mLVZL09Q8UEg-6THfKt_9Vl_i-VNxPYaOeBgRbKVYvHyc=s900-c-k-c0x00ffffff-no-rj" alt="piska" style="max-width: 100%; max-height: 250px; border-radius: 15px; object-fit: contain;">',
                        options: [
                            'Варвар',
                            'Мини П.Е.К.К.А',
                            'Принцесса',
                            'Воздушный шар'
                        ], 
                        correct: 2 
                    },
                    { 
                        points: 30, 
                        text: 'Какой ареной открывается Ведьма (Witch)?', 
                        image: '<img src="https://yt3.googleusercontent.com/ytc/AIdro_nbGdxbYyXSpl3t3nxk8A_7UH9vBU-rFkdzHdBAYPCZScE=s900-c-k-c0x00ffffff-no-rj" alt="piska_bobra" style="max-width: 100%; max-height: 250px; border-radius: 15px; object-fit: contain;">',
                        options: ['Арена 2', 'Арена 5', 'Арена 7', 'Арена 10'], 
                        correct: 1 
                    },
                    { 
                        points: 40, 
                        text: 'Какая карта НЕ является чемпионом?', 
                        image: '<img src="https://avatars.mds.yandex.net/get-shedevrum/12445758/img_e1f94757258511efb97ba615c8878788/orig" alt="piska" style="max-width: 100%; max-height: 250px; border-radius: 15px; object-fit: contain;">',
                        options: [
                            'Золотой рыцарь',
                            'Королева лучников',
                            'Скелет-король',
                            'Мега Рыцарь'
                        ], 
                        correct: 3 
                    },
                    { 
                        points: 50, 
                        text: 'Что за игра на картинке?', 
                        image: 'images/clashroyale.jpg',
                        options: [
                            'Clash of Clans',
                            'Brawl Stars',
                            'Clash Royale',
                            'Hay Day'
                        ], 
                        correct: 2
                    },
                    { 
                        points: 50, 
                        text: 'Что за персонаж на картинке?', 
                        image: '<img src="https://cdn.royaleapi.com/static/img/cards/mega-knight.png?t=330b878fc" alt="mega" style="max-width: 100%; max-height: 250px; border-radius: 15px; object-fit: contain;">',
                        options: [
                            'Принц',
                            'Меганайт',
                            'П.Е.К.К.А',
                            'Гоблин-гигант'
                         ], 
                        correct: 1 
                    }
                ]
            },
            theme3: {
                name: '👸 Богини красоты',
                questions: [
                    { 
                        points: 10, 
                        text: 'Что такое "бронзер"?', 
                        image: '<img src="https://avatars.mds.yandex.net/i?id=bb29ba20e07dade570a7f3d27ed57a68e5bf6299-5229226-images-thumbs&n=13" alt="bronzer" style="max-width: 100%; max-height: 250px; border-radius: 15px; object-fit: contain;">',
                        options: [
                            'Средство для придания коже загара',
                            'Крем для бритья',
                            'База под тени',
                            'Спрей для блеска'
                        ], 
                        correct: 0 
                    },
                    { 
                        points: 20, 
                        text: 'Чем отличается "хайлайтер" от "шимера"?', 
                        image: '<img src="https://avatars.mds.yandex.net/i?id=d7477404beb0ba88e53780b5be87d221fff9f863-5478998-images-thumbs&n=13" alt="highlighter" style="max-width: 100%; max-height: 250px; border-radius: 15px; object-fit: contain;">',
                        options: [
                            'Хайлайтер жидкий, шимер сухой',
                            'Хайлайтер даёт влажное сияние, шимер - мерцание',
                            'Это одно и то же',
                            'Шимер только для тела'
                        ], 
                        correct: 1 
                    },
                    { 
                        points: 30, 
                        text: 'Что такое "праймер" для ресниц?', 
                        image: '<img src="https://cdn1.ozone.ru/s3/multimedia-t/6220042181.jpg" alt="primer" style="max-width: 100%; max-height: 250px; border-radius: 15px; object-fit: contain;">',
                        options: [
                            'База под тушь для объёма',
                            'Сыворотка для роста',
                            'Клей для наращивания',
                            'Масло для снятия макияжа'
                        ], 
                        correct: 0 
                    },
                    { 
                        points: 40, 
                        text: 'Как правильно наносить "контуринг"?', 
                        image: '<img src="https://avatars.mds.yandex.net/get-mpic/16396243/2a0000019918511f59e05ce3f7f39565f5cf/orig" alt="contouring" style="max-width: 100%; max-height: 250px; border-radius: 15px; object-fit: contain;">',
                        options: [
                            'Тёмное под скулы, светлое на выступающие части',
                            'Тёмное на всё лицо',
                            'Только на лоб',
                            'Круговыми движениями'
                        ], 
                        correct: 0 
                    },
                    { 
                        points: 50, 
                        text: 'Что такое "ламинирование бровей"?', 
                        image: '<img src="https://avatars.mds.yandex.net/i?id=ceed17abe026a4b8cb458b4d5642cb61_l-4055806-images-thumbs&n=13" alt="laminating" style="max-width: 100%; max-height: 250px; border-radius: 15px; object-fit: contain;">',
                        options: [
                            'Химическая завивка + фиксация волосков',
                            'Покраска хной',
                            'Наращивание волосков',
                            'Выщипывание пинцетом'
                        ], 
                        correct: 0 
                    },
                    { 
                        points: 50, 
                        text: 'Чем отличается "BB-крем" от "CC-крема"?', 
                        image: '<img src="https://avatars.mds.yandex.net/i?id=8d7fbbc7a049600c370d6e800898b492_l-4055751-images-thumbs&n=13" alt="bbcc" style="max-width: 100%; max-height: 250px; border-radius: 15px; object-fit: contain;">',
                        options: [
                            'BB - увлажнение, CC - коррекция цвета',
                            'BB - для тела, CC - для лица',
                            'Это одно и то же',
                            'BB - только летом'
                        ], 
                        correct: 0 
                    }
                ]
            }
        };

        // Состояние игры
        let currentTheme = 'theme1';
        let usedQuestions = [];
        let currentQuestion = null;
        let selectedOptionIndex = -1;
        
        // Очки команд
        let team1Score = 0;
        let team2Score = 0;
        let team3Score = 0;

        // Массив событий для судьбы
        const fateEvents = [
            { text: "🎲 Лидер теряет 30 баллов!", effect: (scores) => { 
                const max = Math.max(scores.team1, scores.team2, scores.team3);
                if (scores.team1 === max) scores.team1 -= 30;
                else if (scores.team2 === max) scores.team2 -= 30;
                else scores.team3 -= 30;
            }},
            { text: "🎁 Все получают +20 баллов!", effect: (scores) => {
                scores.team1 += 20; scores.team2 += 20; scores.team3 += 20;
            }},
            { text: "👑 Команда с наименьшим счётом получает +50!", effect: (scores) => {
                const min = Math.min(scores.team1, scores.team2, scores.team3);
                if (scores.team1 === min) scores.team1 += 50;
                else if (scores.team2 === min) scores.team2 += 50;
                else scores.team3 += 50;
            }},
            { text: "🌀 Баллы перемешаны случайно!", effect: (scores) => {
                const arr = [scores.team1, scores.team2, scores.team3];
                arr.sort(() => Math.random() - 0.5);
                scores.team1 = arr[0]; scores.team2 = arr[1]; scores.team3 = arr[2];
            }},
            { text: "💄 Команда Визажистки получает +25 за красоту!", effect: (scores) => { scores.team1 += 25; }},
            { text: "👑 Команда Клэшеры получает +25 за эпичность!", effect: (scores) => { scores.team3 += 25; }},
        ];

        // Переключатель темы
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            const body = document.body;
            if (body.classList.contains('light-theme')) {
                body.classList.remove('light-theme');
                body.classList.add('dark-theme');
                themeToggle.innerHTML = '☀️';
            } else {
                body.classList.remove('dark-theme');
                body.classList.add('light-theme');
                themeToggle.innerHTML = '🌙';
            }
        });

        function getTeamNames() {
            return {
                name1: document.getElementById('team1')?.value || 'Команда 1',
                name2: document.getElementById('team2')?.value || 'Команда 2',
                name3: document.getElementById('team3')?.value || 'Команда 3',
            };
        }

        // Отрисовка сетки
        function renderGrid() {
            const grid = document.getElementById('questionsGrid');
            if (!grid) return;
            const themeData = quizData[currentTheme].questions;
            grid.innerHTML = '';
            themeData.forEach(q => {
                const key = `${currentTheme}-${q.points}-${q.text.substring(0,10)}`;
                const isUsed = usedQuestions.includes(key);
                const card = document.createElement('div');
                card.className = `question-card ${isUsed ? 'used' : ''}`;
                card.setAttribute('data-points', q.points);
                card.innerHTML = `<div class="question-points">${q.points}</div><div class="question-bonus">баллов</div>`;
                if (!isUsed) {
                    card.addEventListener('click', (e) => {
                        e.stopPropagation();
                        openQuestion(currentTheme, q);
                    });
                }
                grid.appendChild(card);
            });
        }

        // Открыть вопрос
        function openQuestion(theme, questionObj) {
            currentQuestion = { theme, data: questionObj };
            selectedOptionIndex = -1;

            document.getElementById('questionText').innerText = questionObj.text;
            
            const imgContainer = document.getElementById('questionImage');
            imgContainer.innerHTML = '';

            if (typeof questionObj.image === 'string' && !questionObj.image.startsWith('<')) {
                const img = document.createElement('img');
                img.src = questionObj.image;
                img.alt = 'картинка';
                img.style.maxWidth = '100%';
                img.style.maxHeight = '250px';
                img.style.borderRadius = '15px';
                img.style.objectFit = 'contain';
                imgContainer.appendChild(img);
            } else {
                imgContainer.innerHTML = questionObj.image;
            }

            const optsDiv = document.getElementById('optionsContainer');
            optsDiv.innerHTML = '';
            const letters = ['А', 'Б', 'В', 'Г'];
            questionObj.options.forEach((opt, idx) => {
                const btn = document.createElement('div');
                btn.className = 'option-btn';
                btn.innerText = `${letters[idx]}. ${opt}`;
                btn.setAttribute('data-opt-index', idx);
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedOptionIndex = idx;
                });
                optsDiv.appendChild(btn);
            });

            // Кнопки для баллов
            const scoreDiv = document.getElementById('scoreButtons');
            const names = getTeamNames();
            scoreDiv.innerHTML = '';
            [names.name1, names.name2, names.name3].forEach((teamName, idx) => {
                const btn = document.createElement('button');
                btn.className = 'give-score-btn';
                btn.innerText = `+ ${currentQuestion.data.points} → ${teamName}`;
                btn.addEventListener('click', () => {
                    if (selectedOptionIndex === -1) {
                        alert('Сначала выберите вариант ответа (А-Г)!');
                        return;
                    }
                    const isCorrect = (selectedOptionIndex === currentQuestion.data.correct);
                    if (!isCorrect) {
                        alert('❌ Неправильный ответ. Баллы не начислены.');
                    } else {
                        try {
                            const fanfare = new Audio('https://www.soundjay.com/misc/sounds/fanfare-1.mp3');
                            fanfare.volume = 0.5;
                            fanfare.play().catch(e => console.log('Автовоспроизведение заблокировано'));
                        } catch(e) {}
                        
                        if (typeof confetti === 'function') {
                            confetti({
                                particleCount: 150,
                                spread: 100,
                                origin: { y: 0.6 },
                                colors: ['#ff1493', '#9400d3', '#ff69b4', '#ffd700']
                            });
                        }

                        if (idx === 0) team1Score += currentQuestion.data.points;
                        else if (idx === 1) team2Score += currentQuestion.data.points;
                        else team3Score += currentQuestion.data.points;
                        
                        alert(`✅ Верно! ${currentQuestion.data.points} баллов команде ${teamName}`);
                    }
                    const key = `${currentTheme}-${currentQuestion.data.points}-${currentQuestion.data.text.substring(0,10)}`;
                    if (!usedQuestions.includes(key)) {
                        usedQuestions.push(key);
                    }
                    closeQuestionPanel();
                    renderGrid();
                });
                scoreDiv.appendChild(btn);
            });

            // Штрафные кнопки
            const penaltyDiv = document.getElementById('penaltyButtons');
            penaltyDiv.innerHTML = '';
            [names.name1, names.name2, names.name3].forEach((teamName, idx) => {
                const btn = document.createElement('button');
                btn.className = 'penalty-btn';
                btn.innerText = `-50 штраф → ${teamName}`;
                btn.addEventListener('click', () => {
                    if (confirm(`⚠️ Штраф 50 баллов команде ${teamName}? Спор решён?`)) {
                        if (idx === 0) team1Score = Math.max(0, team1Score - 50);
                        else if (idx === 1) team2Score = Math.max(0, team2Score - 50);
                        else team3Score = Math.max(0, team3Score - 50);
                        alert(`⛔ Штраф 50 баллов команде ${teamName}`);
                    }
                });
                penaltyDiv.appendChild(btn);
            });

            document.getElementById('questionPanel').classList.remove('hidden');
            
            setTimeout(() => {
                document.getElementById('questionPanel').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);
        }

        function closeQuestionPanel() {
            document.getElementById('questionPanel').classList.add('hidden');
            currentQuestion = null;
            selectedOptionIndex = -1;
        }

        // 🎁 КОТ В МЕШКЕ
        function openRandomQuestion() {
            const allThemes = ['theme1', 'theme2', 'theme3'];
            const randomTheme = allThemes[Math.floor(Math.random() * allThemes.length)];
            const themeQuestions = quizData[randomTheme].questions;
            const availableQuestions = themeQuestions.filter(q => {
                const key = `${randomTheme}-${q.points}-${q.text.substring(0,10)}`;
                return !usedQuestions.includes(key);
            });
            
            if (availableQuestions.length === 0) {
                alert('😿 Все вопросы уже использованы!');
                return;
            }
            
            const randomQ = availableQuestions[Math.floor(Math.random() * availableQuestions.length)];
            
            // Временно переключаем тему для отображения
            const oldTheme = currentTheme;
            currentTheme = randomTheme;
            openQuestion(randomTheme, randomQ);
            currentTheme = oldTheme; // Возвращаем тему обратно
        }

        // 🎲 СУДЬБА-ЗЛОДЕЙКА
        function triggerFate() {
            const scores = { team1: team1Score, team2: team2Score, team3: team3Score };
            const event = fateEvents[Math.floor(Math.random() * fateEvents.length)];
            
            // Применяем эффект
            event.effect(scores);
            
            // Обновляем баллы
            team1Score = Math.max(0, scores.team1);
            team2Score = Math.max(0, scores.team2);
            team3Score = Math.max(0, scores.team3);
            
            // Показываем событие
            const fateDiv = document.getElementById('fateEvent');
            fateDiv.innerHTML = event.text;
            fateDiv.classList.remove('hidden');
            
            // Конфетти в цвет
            if (typeof confetti === 'function') {
                confetti({
                    particleCount: 100,
                    spread: 80,
                    origin: { y: 0.5 },
                    colors: ['#ffd700', '#ffa500', '#ff69b4']
                });
            }
            
            // Скрываем через 4 секунды
            setTimeout(() => {
                fateDiv.classList.add('hidden');
            }, 4000);
        }

        // ☠️ ВСЁ ПРОПАЛО
        function resetGame() {
            if (confirm('☠️ ТОЧНО? Все баллы и прогресс сгорят!')) {
                team1Score = 0;
                team2Score = 0;
                team3Score = 0;
                usedQuestions = [];
                renderGrid();
                closeQuestionPanel();
                alert('💀 Игра сброшена. Начинаем с чистого листа!');
                
                // Мрачное конфетти
                if (typeof confetti === 'function') {
                    confetti({
                        particleCount: 50,
                        spread: 60,
                        origin: { y: 0.5 },
                        colors: ['#000000', '#4a4a4a', '#8b8b8b']
                    });
                }
            }
        }

        function renderLeaderboard() {
            const names = getTeamNames();
            const contentDiv = document.getElementById('leaderboardContent');
            contentDiv.innerHTML = '';
            const rows = [
                { name: names.name1, score: team1Score },
                { name: names.name2, score: team2Score },
                { name: names.name3, score: team3Score }
            ];
            rows.sort((a,b) => b.score - a.score);
            rows.forEach(r => {
                const row = document.createElement('div');
                row.className = 'leaderboard-row';
                row.innerHTML = `<span>${r.name}</span> <span>${r.score} баллов</span>`;
                contentDiv.appendChild(row);
            });
        }

        // Слушатели
        document.getElementById('startBtn').addEventListener('click', () => {
            document.getElementById('splash').classList.add('hidden');
            document.getElementById('mainGame').classList.remove('hidden');
            renderGrid();
        });

        document.getElementById('theme1Btn').addEventListener('click', () => {
            currentTheme = 'theme1';
            document.getElementById('theme1Btn').classList.add('active');
            document.getElementById('theme2Btn').classList.remove('active');
            document.getElementById('theme3Btn').classList.remove('active');
            renderGrid();
            closeQuestionPanel();
        });
        document.getElementById('theme2Btn').addEventListener('click', () => {
            currentTheme = 'theme2';
            document.getElementById('theme2Btn').classList.add('active');
            document.getElementById('theme1Btn').classList.remove('active');
            document.getElementById('theme3Btn').classList.remove('active');
            renderGrid();
            closeQuestionPanel();
        });
        document.getElementById('theme3Btn').addEventListener('click', () => {
            currentTheme = 'theme3';
            document.getElementById('theme3Btn').classList.add('active');
            document.getElementById('theme1Btn').classList.remove('active');
            document.getElementById('theme2Btn').classList.remove('active');
            renderGrid();
            closeQuestionPanel();
        });

        document.getElementById('cancelQuestionBtn').addEventListener('click', closeQuestionPanel);

        document.getElementById('showLeaderboardBtn').addEventListener('click', () => {
            renderLeaderboard();
            document.getElementById('leaderboardPanel').classList.remove('hidden');
        });
        document.getElementById('closeLeaderboardBtn').addEventListener('click', () => {
            document.getElementById('leaderboardPanel').classList.add('hidden');
        });

        // Новые кнопки
        document.getElementById('catButton').addEventListener('click', openRandomQuestion);
        document.getElementById('fateButton').addEventListener('click', triggerFate);
        document.getElementById('resetButton').addEventListener('click', resetGame);

        renderGrid();
    })();
</script>
