<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 Бьюти-квиз + Clash Royale к 8 марта</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #2d1b2b 0%, #1a1a2e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }
        .app-container {
            max-width: 1200px;
            width: 100%;
            background: rgba(255, 240, 245, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            box-shadow: 0 30px 50px rgba(255, 20, 147, 0.4);
            overflow: hidden;
            padding: 25px;
            border: 2px solid #ffb6c1;
        }
        .splash-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            text-align: center;
            animation: fadeIn 1.2s ease-out;
        }
        .splash-screen h1 {
            font-size: 4rem;
            color: #ff1493;
            text-shadow: 0 8px 20px #ff69b4;
            margin-bottom: 20px;
            animation: float 2s infinite ease-in-out;
        }
        .splash-screen p {
            font-size: 1.8rem;
            color: #9400d3;
            margin-bottom: 40px;
        }
        .splash-screen button {
            background: #ff1493;
            border: none;
            color: white;
            font-size: 2rem;
            padding: 20px 60px;
            border-radius: 60px;
            box-shadow: 0 10px 0 #8b008b, 0 10px 25px #ff69b4;
            cursor: pointer;
            transition: 0.07s;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .splash-screen button:active {
            transform: translateY(10px);
            box-shadow: 0 2px 0 #8b008b, 0 5px 20px #ff69b4;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .teams-panel {
            display: flex;
            gap: 20px;
            background: #ffe4e1;
            border-radius: 40px;
            padding: 15px 25px;
            box-shadow: inset 0 2px 8px #ffb6c1, 0 6px 12px #d8bfd8;
        }
        .team-input {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .team-input label {
            font-weight: 600;
            color: #c71585;
            margin-bottom: 5px;
        }
        .team-input input {
            border: 2px solid #ff69b4;
            border-radius: 30px;
            padding: 8px 15px;
            font-size: 1.1rem;
            width: 140px;
            background: white;
            text-align: center;
            font-weight: 600;
            color: #4b0082;
        }
        .leaderboard-btn {
            background: #f0e6ff;
            border: 3px solid #da70d6;
            border-radius: 50px;
            padding: 10px 25px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #8a2be2;
            cursor: pointer;
            box-shadow: 0 5px 0 #ba55d3;
            transition: 0.07s;
            white-space: nowrap;
        }
        .leaderboard-btn:active {
            transform: translateY(5px);
            box-shadow: none;
        }
        .quiz-main {
            background: #fff0f5;
            border-radius: 50px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 0 2px white, 0 15px 25px #dda0dd;
        }
        .theme-tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            justify-content: center;
        }
        .theme-btn {
            background: #ffe4e1;
            border: 3px solid #db7093;
            font-size: 1.6rem;
            padding: 15px 20px;
            border-radius: 60px;
            font-weight: 700;
            color: #b0306a;
            cursor: pointer;
            flex: 1;
            max-width: 450px;
            box-shadow: 0 6px 0 #b34e7a;
            transition: 0.07s;
            text-align: center;
        }
        .theme-btn.active {
            background: #db7093;
            color: white;
            transform: translateY(3px);
            box-shadow: 0 3px 0 #8b3a5e;
        }
        .questions-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }
        .question-card {
            background: white;
            border-radius: 40px;
            padding: 15px;
            width: 100px;
            height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 4px solid #ffb6c1;
            font-weight: bold;
            color: #8b4513;
            box-shadow: 0 8px 0 #dda0dd;
            cursor: pointer;
            transition: 0.07s;
        }
        .question-card.used {
            opacity: 0.35;
            pointer-events: none;
            filter: grayscale(0.6);
            border-color: #a9a9a9;
            box-shadow: 0 5px 0 #808080;
            transform: scale(0.95);
        }
        .question-card:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0 #dda0dd;
        }
        .question-points {
            font-size: 1.8rem;
            line-height: 1;
        }
        .question-bonus {
            font-size: 0.9rem;
            color: #c71585;
        }
        .question-window {
            background: #ffe4f0;
            border-radius: 50px;
            padding: 25px;
            margin: 20px 0;
            border: 3px solid white;
        }
        .q-text {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #4b0082;
        }
        .q-image {
            font-size: 4rem;
            background: #fadadd;
            border-radius: 40px;
            padding: 15px;
            text-align: center;
            margin-bottom: 25px;
            border: 2px dashed #ff69b4;
            color: #c71585;
        }
        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }
        .option-btn {
            background: white;
            border: 3px solid #ff99cc;
            border-radius: 100px;
            padding: 12px;
            font-size: 1.2rem;
            font-weight: 500;
            color: #4b0082;
            cursor: pointer;
            transition: 0.07s;
            text-align: left;
            padding-left: 25px;
        }
        .option-btn.selected {
            background: #dda0dd;
            color: white;
            border-color: #ba55d3;
        }
        .score-buttons {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 20px 0 10px;
        }
        .give-score-btn {
            background: #98fb98;
            border: none;
            border-radius: 50px;
            padding: 15px 30px;
            font-size: 1.4rem;
            font-weight: bold;
            color: #006400;
            border-bottom: 6px solid #2e8b57;
            cursor: pointer;
            transition: 0.07s;
            flex: 1;
            min-width: 150px;
        }
        .give-score-btn:active {
            transform: translateY(6px);
            border-bottom-width: 2px;
        }
        .cancel-question {
            background: #d3d3d3;
            border: none;
            border-radius: 50px;
            padding: 10px 25px;
            font-size: 1.2rem;
            cursor: pointer;
        }
        .leaderboard-overlay {
            background: #faf0e6;
            border-radius: 60px;
            padding: 30px;
            margin-top: 20px;
            border: 4px solid #ffb6c1;
        }
        .leaderboard-row {
            display: flex;
            justify-content: space-between;
            font-size: 2rem;
            padding: 15px 30px;
            background: white;
            border-radius: 50px;
            margin-bottom: 15px;
            font-weight: 700;
        }
        .leaderboard-row span:first-child { color: #c71585; }
        .leaderboard-row span:last-child { color: #228b22; }
        .close-leaderboard {
            background: #ffb6c1;
            color: #4b0082;
            border: none;
            font-size: 1.5rem;
            padding: 10px 35px;
            border-radius: 50px;
            font-weight: bold;
            margin-top: 10px;
        }
        .hidden { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        @keyframes float { 0% { transform: translateY(0); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0); } }
    </style>
</head>
<body>
<div class="app-container" id="appContainer">
    <!-- ЗАСТАВКА -->
    <div id="splash" class="splash-screen">
        <h1>💄 8 марта + Clash 👑</h1>
        <p>Бьюти-квиз + эпичные вопросы</p>
        <button id="startBtn">Войти в игру →</button>
    </div>

    <!-- ОСНОВНАЯ ИГРА -->
    <div id="mainGame" class="hidden">
        <div class="header">
            <div class="teams-panel">
                <div class="team-input">
                    <label>Команда 1</label>
                    <input type="text" id="team1" value="💅 Визажистки">
                </div>
                <div class="team-input">
                    <label>Команда 2</label>
                    <input type="text" id="team2" value="💋 Бьюти-блогерки">
                </div>
                <div class="team-input">
                    <label>Команда 3</label>
                    <input type="text" id="team3" value="👑 Клэшеры">
                </div>
            </div>
            <button class="leaderboard-btn" id="showLeaderboardBtn">🏆 Таблица лидеров</button>
        </div>

        <div class="quiz-main">
            <div class="theme-tabs">
                <div class="theme-btn active" id="theme1Btn">💄 Бьюти-эксперт</div>
                <div class="theme-btn" id="theme2Btn">👑 Clash Royale</div>
            </div>

            <div id="questionsGrid" class="questions-grid"></div>

            <div id="questionPanel" class="question-window hidden">
                <div class="q-text" id="questionText">Загружается...</div>
                <div class="q-image" id="questionImage">🌸</div>
                <div class="options" id="optionsContainer"></div>
                <div class="score-buttons" id="scoreButtons"></div>
                <button id="cancelQuestionBtn" class="cancel-question">✖ Закрыть вопрос</button>
            </div>
        </div>

        <div id="leaderboardPanel" class="leaderboard-overlay hidden">
            <div id="leaderboardContent"></div>
            <button class="close-leaderboard" id="closeLeaderboardBtn">Закрыть</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // ========== БЬЮТИ-ВОПРОСЫ + CLASH ROYALE ==========
        const quizData = {
            theme1: {
                name: '💄 Бьюти-эксперт',
                questions: [
                    { 
                        points: 10, 
                        text: 'Что это за инструмент? (На фото металлический керлер)', 
                        image: '<img src="https://avatars.mds.yandex.net/i?id=8f83f716c672378065b4be05faff599eecf72e71-4395348-images-thumbs&n=13" alt="kerler" width="300" height="300">',
                        options: [
                            'Зажим для накладных ресниц',
                            'Щипцы для механической завивки ресниц',
                            'Инструмент для снятия нарощенных ресниц',
                            'Пресс для изгиба бровей'
                        ], 
                        correct: 1 
                    },
                    { 
                        points: 20, 
                        text: 'Для чего предназначена кисть-веер?', 
                        image: '<img src="https://avatars.mds.yandex.net/get-mpic/7543961/img_id8916896061490917613.jpeg/300x300" alt="kons" width="300" height="300">',
                        options: [
                            'Для нанесения масок на Т-зону',
                            'Для растушевки карандаша по контуру губ',
                            'Для смахивания излишков теней и нанесения хайлайтера',
                            'Для прокрашивания нижних ресниц'
                        ], 
                        correct: 2 
                    },
                    { 
                        points: 30, 
                        text: 'Что такое «Кайал» (Kajal)?', 
                        image: '<img src="https://i.letu.ru/common/img/pim/2025/10/EX_93ec31ca-d4dc-4c30-87e2-0d4f2d4a34cd.jpg" alt="kon" width="300" height="300">',
                        options: [
                            'Стойкая подводка для тонких стрелок',
                            'Мягкий жирный карандаш для слизистой глаза',
                            'Маркер для имитации густых бровей',
                            'Средство для закрашивания седины'
                        ], 
                        correct: 1 
                    },
                    { 
                        points: 40, 
                        text: 'Как работает «Тинт» для губ?', 
                        image: '<img src="https://www.letu.ru/common/img/pim/2024/12/EX_7c534c4a-1e98-4116-947c-2fba5e6aaf27.jpg" alt="kns" width="300" height="300">',
                        options: [
                            'Создает плотное виниловое покрытие',
                            'Впитывается в кожу, оставляя стойкий пигмент',
                            'Работает как клей для блесток',
                            'Визуально увеличивает губы (плампер)'
                        ], 
                        correct: 1 
                    },
                    { 
                        points: 50, 
                        text: 'Зачем нужен «Консилер»?', 
                        image: '<img src="https://avatars.mds.yandex.net/get-sprav-products/10022375/f6ca7e92039fb05a27f0b56dbb21985e/M_height" alt="kons" width="300" height="300">',
                        options: [
                            'Для увлажнения кожи перед макияжем',
                            'Для фиксации макияжа',
                            'Для точечной маскировки несовершенств и зоны под глазами',
                            'Для эффекта "зацелованных губ"'
                        ], 
                        correct: 2 
                    },
                    { 
                        points: 50, 
                        text: 'Для чего предназначен «Силиконовый спонж» (Силипафф)?', 
                        image: '<img src="https://avatars.mds.yandex.net/i?id=523f6b9ea9b2f2b390df54e8dc0cfc5d_sr-7045478-images-thumbs&n=13" alt="spong" width="300" height="300">',
                        options: [
                            'Для втирания масел в кожу головы',
                            'Для нанесения тональных средств без впитывания',
                            'Подкладка под глаза от осыпания теней',
                            'Многоразовый патч от морщин'
                        ], 
                        correct: 1 
                    }
                ]
            },
            theme2: {
                name: '👑 Clash Royale',
                questions: [
                    { 
                        points: 10, 
                        text: 'Сколько эликсира стоит Хог Райдер (Hog Rider)?',
                        image: '<img src="https://avatars.mds.yandex.net/get-shedevrum/12445758/img_e1f94757258511efb97ba615c8878788/orig" alt="piska_gay" width="300" height="300">',
                        options: ['3', '4', '5', '6'], 
                        correct: 1 
                    },
                    { 
                        points: 20, 
                        text: 'Какая карта является легендарной?', 
                        image: '<img src="https://yt3.googleusercontent.com/ytc/AIdro_mLVZL09Q8UEg-6THfKt_9Vl_i-VNxPYaOeBgRbKVYvHyc=s900-c-k-c0x00ffffff-no-rj" alt="piska" width="300" height="300">',
                        options: [
                            'Варвар',
                            'Мини П.Е.К.К.А',
                            'Принцесса',
                            'Воздушный шар'
                        ], 
                        correct: 2 
                    },
                    { 
                        points: 30, 
                        text: 'Какой ареной открывается Ведьма (Witch)?', 
                        image: '<img src="https://yt3.googleusercontent.com/ytc/AIdro_nbGdxbYyXSpl3t3nxk8A_7UH9vBU-rFkdzHdBAYPCZScE=s900-c-k-c0x00ffffff-no-rj" alt="piska_bobra" width="300" height="300">',
                        options: ['Арена 2', 'Арена 5', 'Арена 7', 'Арена 10'], 
                        correct: 1 
                    },
                    { 
                        points: 40, 
                        text: 'Какая карта НЕ является чемпионом?', 
                        image: '<img src="https://avatars.mds.yandex.net/get-shedevrum/12445758/img_e1f94757258511efb97ba615c8878788/orig" alt="piska" width="300" height="300">',
                        options: [
                            'Золотой рыцарь',
                            'Королева лучников',
                            'Скелет-король',
                            'Мега Рыцарь'
                        ], 
                        correct: 3 
                    },
                    { 
                        points: 50, 
                        text: 'Что за игра на картинке?', 
                        image: 'images/clashroyale.jpg',
                         options: [
                            'Clash of Clans',
                            'Brawl Stars',
                            'Clash Royale',
                            'Hay Day'
                        ], 
                        correct: 2  // 2 = В (Clash Royale), потому что А-0, Б-1, В-2, Г-3
                    },
                    { 
                        points: 50, 
                        text: 'Что за персонаж на картинке?', 
                        image: '<img src="https://cdn.royaleapi.com/static/img/cards/mega-knight.png?t=330b878fc" alt="mega">',  // <--- ВОТ СЮДА ВСТАВЛЯТЬ КАРТИНКУ
                        options: [
                            'Принц',
                            'Меганайт',
                            'П.Е.К.К.А',
                            'Гоблин-гигант'
                         ], 
                        correct: 1 
                    }
                ]
            }
        };

        // Состояние игры
        let currentTheme = 'theme1';
        let usedQuestions = [];
        let currentQuestion = null;
        let selectedOptionIndex = -1;

        // Счет команд
        function getScores() {
            return {
                team1: parseInt(localStorage.getItem('team1Score') || '0'),
                team2: parseInt(localStorage.getItem('team2Score') || '0'),
                team3: parseInt(localStorage.getItem('team3Score') || '0')
            };
        }
        function setScores(t1, t2, t3) {
            localStorage.setItem('team1Score', t1.toString());
            localStorage.setItem('team2Score', t2.toString());
            localStorage.setItem('team3Score', t3.toString());
        }
        if (!localStorage.getItem('team1Score')) setScores(0,0,0);

        function getTeamNames() {
            return {
                name1: document.getElementById('team1')?.value || 'Команда 1',
                name2: document.getElementById('team2')?.value || 'Команда 2',
                name3: document.getElementById('team3')?.value || 'Команда 3',
            };
        }

        // Отрисовка сетки вопросов
        function renderGrid() {
            const grid = document.getElementById('questionsGrid');
            if (!grid) return;
            const themeData = quizData[currentTheme].questions;
            grid.innerHTML = '';
            themeData.forEach(q => {
                const key = `${currentTheme}-${q.points}-${q.text.substring(0,10)}`; // уникальный ключ
                const isUsed = usedQuestions.includes(key);
                const card = document.createElement('div');
                card.className = `question-card ${isUsed ? 'used' : ''}`;
                card.setAttribute('data-points', q.points);
                card.innerHTML = `<div class="question-points">${q.points}</div><div class="question-bonus">баллов</div>`;
                if (!isUsed) {
                    card.addEventListener('click', (e) => {
                        e.stopPropagation();
                        openQuestion(currentTheme, q);
                    });
                }
                grid.appendChild(card);
            });
        }

        function openQuestion(theme, questionObj) {
            currentQuestion = { theme, data: questionObj };
            selectedOptionIndex = -1;
            console.log('Открываем вопрос:', questionObj); // Добавьте эту строку
            console.log('Текст вопроса:', questionObj.text); // И эту
            document.getElementById('questionText').innerText = questionObj.text;
            

        const imgContainer = document.getElementById('questionImage');
        imgContainer.innerHTML = ''; // Очищаем

        if (questionObj.image && !questionObj.image.startsWith('<')) {
            // Если это просто путь к картинке
            const img = document.createElement('img');
            img.src = questionObj.image;
            img.alt = 'Clash Royale';
            img.style.maxWidth = '300px';
            img.style.borderRadius = '20px';
            imgContainer.appendChild(img);
        } else {
             // Если это уже HTML-тег
            imgContainer.innerHTML = questionObj.image;
        }

            const optsDiv = document.getElementById('optionsContainer');
            optsDiv.innerHTML = '';
            const letters = ['А', 'Б', 'В', 'Г'];
            questionObj.options.forEach((opt, idx) => {
                const btn = document.createElement('div');
                btn.className = 'option-btn';
                btn.innerText = `${letters[idx]}. ${opt}`;
                btn.setAttribute('data-opt-index', idx);
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedOptionIndex = idx;
                });
                optsDiv.appendChild(btn);
            });

            const scoreDiv = document.getElementById('scoreButtons');
            const names = getTeamNames();
            scoreDiv.innerHTML = '';
            [names.name1, names.name2, names.name3].forEach((teamName, idx) => {
                const btn = document.createElement('button');
                btn.className = 'give-score-btn';
                btn.innerText = `+ ${currentQuestion.data.points} → ${teamName}`;
                btn.addEventListener('click', () => {
                    if (selectedOptionIndex === -1) {
                        alert('Сначала выберите вариант ответа (А-Г)!');
                        return;
                    }
                    const isCorrect = (selectedOptionIndex === currentQuestion.data.correct);
                    if (!isCorrect) {
                        alert('❌ Неправильный ответ. Баллы не начислены.');
                    } else {
                        const scores = getScores();
                        if (idx === 0) scores.team1 += currentQuestion.data.points;
                        else if (idx === 1) scores.team2 += currentQuestion.data.points;
                        else scores.team3 += currentQuestion.data.points;
                        setScores(scores.team1, scores.team2, scores.team3);
                        alert(`✅ Верно! ${currentQuestion.data.points} баллов команде ${teamName}`);
                    }
                    const key = `${currentTheme}-${currentQuestion.data.points}-${currentQuestion.data.text.substring(0,10)}`;
                    if (!usedQuestions.includes(key)) {
                        usedQuestions.push(key);
                    }
                    closeQuestionPanel();
                    renderGrid();
                });
                scoreDiv.appendChild(btn);
            });

            document.getElementById('questionPanel').classList.remove('hidden');
        
        }

        function closeQuestionPanel() {
            document.getElementById('questionPanel').classList.add('hidden');
            currentQuestion = null;
            selectedOptionIndex = -1;
        }

        function renderLeaderboard() {
            const scores = getScores();
            const names = getTeamNames();
            const contentDiv = document.getElementById('leaderboardContent');
            contentDiv.innerHTML = '';
            const rows = [
                { name: names.name1, score: scores.team1 },
                { name: names.name2, score: scores.team2 },
                { name: names.name3, score: scores.team3 }
            ];
            rows.sort((a,b) => b.score - a.score);
            rows.forEach(r => {
                const row = document.createElement('div');
                row.className = 'leaderboard-row';
                row.innerHTML = `<span>${r.name}</span> <span>${r.score} баллов</span>`;
                contentDiv.appendChild(row);
            });
        }

        // Слушатели
        document.getElementById('startBtn').addEventListener('click', () => {
            document.getElementById('splash').classList.add('hidden');
            document.getElementById('mainGame').classList.remove('hidden');
            renderGrid();
        });

        document.getElementById('theme1Btn').addEventListener('click', () => {
            currentTheme = 'theme1';
            document.getElementById('theme1Btn').classList.add('active');
            document.getElementById('theme2Btn').classList.remove('active');
            renderGrid();
            closeQuestionPanel();
        });
        document.getElementById('theme2Btn').addEventListener('click', () => {
            currentTheme = 'theme2';
            document.getElementById('theme2Btn').classList.add('active');
            document.getElementById('theme1Btn').classList.remove('active');
            renderGrid();
            closeQuestionPanel();
        });

        document.getElementById('cancelQuestionBtn').addEventListener('click', closeQuestionPanel);

        document.getElementById('showLeaderboardBtn').addEventListener('click', () => {
            renderLeaderboard();
            document.getElementById('leaderboardPanel').classList.remove('hidden');
        });
        document.getElementById('closeLeaderboardBtn').addEventListener('click', () => {
            document.getElementById('leaderboardPanel').classList.add('hidden');
        });

        renderGrid();
    })();
</script>
</body>

</html>
